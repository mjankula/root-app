apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-webapp
  template:
    metadata:
      labels:
        app: color-webapp
    spec:
      containers:
        - name: bubble-animation
          image: quay.io/rhdevelopers/bgd:1.0.0
          ports:
            - containerPort: 8080
          env:
            # This value will be set dynamically by the ApplicationSet
            - name: COLOR
              value: {{ .Values.color | quote }}
