apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: color-app-set
  namespace: openshift-gitops
spec:
  generators:
    # The matrix generator combines the results of two other generators.
    - matrix:
        generators:
          # Generator 1: Reads the config.json file from your Git repo.
          # It will produce a list of elements, each with 'namespace' and 'color'.
          - git:
              repoURL: 'https://github.com/mjankula/root-app.git' # <-- Change to your repo URL
              revision: main
              files:
                - path: "my-webapp/environments/config.json"

          # Generator 2: Gets the information about the cluster.
          # We only need this to get the cluster's server URL.
          - clusters:
              selector:
                # Select the local OpenShift cluster
                kubernetes.io/metadata.name: in-cluster


  # The template for the Argo CD Application remains the same.
  template:
    metadata:
      name: 'color-app-{{name}}' # {{name}} will now be 'blue'
      namespace: openshift-gitops
    spec:
      project: default
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{name}}' # Deploys to the 'blue' namespace

      source:
        repoURL: 'https://github.com/mjankula/root-app.git' 
        targetRevision: main
        path: my-webapp/helm-chart
        helm:
          parameters:
            - name: 'color'
              value: '{{name}}' # Passes 'blue' as the Helm value
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
