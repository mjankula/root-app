apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: color-app-set
  namespace: openshift-gitops
spec:
  generators:
    # Use the 'clusterResource' generator to find resources based on a label.
    - clusterResource:
        resource: projects
        # This selector finds all Projects with the matching label.
        selector:
          matchLabels:
            argocd.argoproj.io/managed-by: color-app-set
        template:
          name: '{{.metadata.name}}'

  # The template for the Argo CD Application remains the same.
  template:
    metadata:
      name: 'color-app-{{name}}' # {{name}} will now be 'blue'
      namespace: openshift-gitops
    spec:
      project: default
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{name}}' # Deploys to the 'blue' namespace

      source:
        repoURL: 'https://github.com/mjankula/root-app.git' 
        targetRevision: main
        path: my-webapp/helm-chart
        helm:
          parameters:
            - name: 'color'
              value: '{{name}}' # Passes 'blue' as the Helm value
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
